<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Professional Stopwatch</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Background Glow -->
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="stopwatch-card">

      <h1>STOPWATCH</h1>
      <p class="subtitle">Professional Web Application</p>

      <!-- Timer -->
      <div class="timer-circle">

        <div class="inner-circle">
          <span id="display">00:00:00</span>
        </div>

      </div>

      <!-- Buttons -->
      <div class="buttons">

        <button id="startPauseBtn" class="start-btn">
          Start
        </button>

        <button id="lapBtn" class="lap-btn">
          Lap
        </button>

        <button id="resetBtn" class="reset-btn">
          Reset
        </button>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="laps-card">

      <div class="lap-header">
        <h2>Lap Records</h2>
        <span id="lapCount">0 Laps</span>
      </div>

      <div id="lapsContainer" class="laps-container">

        <div class="empty">
          No lap records yet...
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
